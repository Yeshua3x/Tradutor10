<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>フレーズ翻訳者</title>
    <style>
        * {
            box-sizing: border-box;
        }
        body {
            font-family: 'Arial', sans-serif;
            background: #f0f0f0;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        header {
            width: 100%;
            background: #007BFF;
            color: #fff;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .menu-icon {
            cursor: pointer;
            font-size: 1.5em;
        }
        nav {
            display: none;
            flex-direction: column;
            position: absolute;
            top: 60px;
            right: 20px;
            background: #fff;
            border: 1px solid #ccc;
            border-radius: 5px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            z-index: 1000;
        }
        nav a {
            padding: 10px 15px;
            text-decoration: none;
            color: #007BFF;
        }
        nav a:hover {
            background: #f0f0f0;
        }
        input {
            padding: 10px;
            width: 100%;
            margin-top: 20px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }
        #result {
            margin-top: 20px;
            font-weight: bold;
        }
        #content {
            margin-top: 20px;
            width: 100%;
        }
        .phrase {
            margin: 10px 0;
        }
        .home-btn {
            margin-top: 20px;
            padding: 10px 15px;
            background: #007BFF;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        .home-btn:hover {
            background: #0056b3;
        }
    </style>
</head>
<body>
    <header>
        <h1>フレーズ翻訳者</h1>
        <div class="menu-icon" onclick="toggleMenu()">☰</div>
        <nav id="navMenu">
            <a href="ingles.html">英語</a>
            <a href="espanhol.html">スペイン語</a>
            <a href="frances.html">フランス語</a>
            <a href="alemao.html">ドイツ語</a>
            <a href="portuguese_to_spanish.html">ポルトガル語からスペイン語</a>
            <a class="home-btn" href="index.html">ホームに戻る</a>
        </nav>
    </header>
    
    <input type="text" id="userInput" placeholder="日本語のフレーズを入力..." />
    <div id="result"></div>
    <div id="content"></div>

    <script>
        let translations = [];

        // Função para carregar o arquivo JSON com as traduções
        fetch('japanese_to_portuguese.json')  // Use o arquivo que você tiver para japonês
            .then(response => response.json())
            .then(data => {
                translations = data.phrases;
                populatePhraseList();
            })
            .catch(error => console.error('Erro ao carregar o JSON:', error));

        function populatePhraseList() {
            const contentDiv = document.getElementById('content');
            translations.forEach(item => {
                const phraseDiv = document.createElement('div');
                phraseDiv.className = 'phrase';
                phraseDiv.innerText = item.japanese; // Ajuste conforme o arquivo JSON
                contentDiv.appendChild(phraseDiv);
            });
        }

        // Função para verificar a frase digitada
        document.getElementById('userInput').addEventListener('input', function() {
            const userInput = this.value.trim();
            const match = translations.find(item => item.japanese.toLowerCase() === userInput.toLowerCase());

            if (match) {
                const resultDiv = document.getElementById('result');
                resultDiv.innerHTML = `
                    <div class="translation"><strong>翻訳:</strong> ${match.portuguese}</div>
                    <div class="translation"><strong>関連する単語:</strong></div>
                `;

                match.words.forEach(word => {
                    resultDiv.innerHTML += `${word.japanese} - ${word.portuguese}<br>`;
                });
            } else {
                document.getElementById('result').innerHTML = '';
            }
        });

        function toggleMenu() {
            const menu = document.getElementById('navMenu');
            menu.style.display = menu.style.display === 'block' ? 'none' : 'block';
        }
    </script>
</body>
</html>
