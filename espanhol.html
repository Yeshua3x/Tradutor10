<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tradutor de Frases</title>
    <style>
        * {
            box-sizing: border-box;
        }
        body {
            font-family: 'Arial', sans-serif;
            background: #f0f0f0;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        header {
            width: 100%;
            background: #007BFF;
            color: #fff;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .menu-icon {
            cursor: pointer;
            font-size: 1.5em;
        }
        nav {
            display: none;
            flex-direction: column;
            position: absolute;
            top: 60px;
            right: 20px;
            background: #fff;
            border: 1px solid #ccc;
            border-radius: 5px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            z-index: 1000;
        }
        nav a {
            padding: 10px 15px;
            text-decoration: none;
            color: #007BFF;
        }
        nav a:hover {
            background: #f0f0f0;
        }
        input {
            padding: 10px;
            width: 100%;
            margin-top: 20px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }
        #result {
            margin-top: 20px;
            font-weight: bold;
        }
        #content {
            margin-top: 20px;
            width: 100%;
        }
        .phrase {
            margin: 10px 0;
        }
        .home-btn {
            margin-top: 20px;
            padding: 10px 15px;
            background: #007BFF;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        .home-btn:hover {
            background: #0056b3;
        }
        .menu {
    /* Estilo do menu */
    background-color: #fff;
    border: 1px solid #ccc;
    /* outros estilos */
}
.close-icon {
    cursor: pointer;
    font-size: 24px; /* Tamanho do ícone de fechar */
    /* outros estilos */
}
    </style>
</head>
<body>
    <header>
        <h1>Tradutor de Frases</h1>
        <div class="menu-icon" onclick="toggleMenu()">☰</div>
<div class="menu" id="menu" style="display: none;">
    <div class="close-icon" onclick="toggleMenu()">×</div>
            <a href="ingles.html">Inglês</a>
            <a href="espanhol.html">Espanhol</a>
            <a href="frances.html">Francês</a>
            <a href="alemao.html">Alemão</a>
              <a class="home-btn" href="index.html">Voltar para a Home</a>
        </nav>
    </header>
    
    <input type="text" id="userInput" placeholder="Digite uma frase em português..." />
    <div id="result"></div>
    <div id="content"></div>

    <script>
        let translations = [];

        // Função para carregar o arquivo JSON com as traduções
        fetch('portuguese_to_spanish.json')  
            .then(response => response.json())
            .then(data => {
                translations = data.phrases;
                populatePhraseList();
            })
            .catch(error => console.error('Erro ao carregar o JSON:', error));

        function populatePhraseList() {
            const contentDiv = document.getElementById('content');
            translations.forEach(item => {
                const phraseDiv = document.createElement('div');
                phraseDiv.className = 'phrase';
                phraseDiv.innerText = item.portuguese;
                contentDiv.appendChild(phraseDiv);
            });
        }

        // Função para verificar a frase digitada
        document.getElementById('userInput').addEventListener('input', function() {
            const userInput = this.value.trim();
            const match = translations.find(item => item.portuguese.toLowerCase() === userInput.toLowerCase());

            if (match) {
                const resultDiv = document.getElementById('result');
                resultDiv.innerHTML = `
                    <div class="translation"><strong>Tradução:</strong> ${match.spanish}</div>
                    <div class="translation"><strong>Palavras Relevantes:</strong></div>
                `;

                match.words.forEach(word => {
                    resultDiv.innerHTML += `${word.portuguese} - ${word.spanish}<br>`;
                });
            } else {
                document.getElementById('result').innerHTML = '';
            }
        });

                                            }

        function toggleMenu() {
    const menu = document.getElementById('menu');
    menu.style.display = (menu.style.display === 'none' || menu.style.display === '') ? 'block' : 'none';
}
    </script>
</body>
</html>
