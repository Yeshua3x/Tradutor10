<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tradutor de Frases</title>
    <style>
        * {
            box-sizing: border-box;
        }
        body {
            font-family: 'Arial', sans-serif;
            background: #f0f0f0;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        header {
            width: 100%;
            background: #007BFF;
            color: #fff;
            padding: 15px 20px;
            text-align: center;
        }
        input {
            padding: 10px;
            width: 100%;
            margin-top: 20px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }
        #result {
            margin-top: 20px;
            font-weight: bold;
        }
        #content {
            margin-top: 20px;
            width: 100%;
        }
        .phrase {
            margin: 10px 0;
        }
    </style>
</head>
<body>
    <header>
        <h1>Tradutor de Frases</h1>
    </header>
    
    <input type="text" id="userInput" placeholder="Digite uma frase em português..." />
    <div id="result"></div>
    <div id="content"></div>

    <script>
        let translations = [];

        // Função para carregar o arquivo JSON com as traduções
        fetch('portuguese_to_spanish.json')  // Mudança aqui para o novo nome
            .then(response => response.json())
            .then(data => {
                translations = data.phrases;
                populatePhraseList();
            })
            .catch(error => console.error('Erro ao carregar o JSON:', error));

        function populatePhraseList() {
            const contentDiv = document.getElementById('content');
            translations.forEach(item => {
                const phraseDiv = document.createElement('div');
                phraseDiv.className = 'phrase';
                phraseDiv.innerText = item.portuguese;
                contentDiv.appendChild(phraseDiv);
            });
        }

        // Função para verificar a frase digitada
        document.getElementById('userInput').addEventListener('input', function() {
            const userInput = this.value.trim();
            const match = translations.find(item => item.portuguese.toLowerCase() === userInput.toLowerCase());

            if (match) {
                const resultDiv = document.getElementById('result');
                resultDiv.innerHTML = `
                    <div class="translation"><strong>Tradução:</strong> ${match.spanish}</div>
                    <div class="translation"><strong>Palavras Relevantes:</strong></div>
                `;

                match.words.forEach(word => {
                    resultDiv.innerHTML += `${word.portuguese} - ${word.spanish}<br>`;
                });
            } else {
                document.getElementById('result').innerHTML = '';
            }
        });
    </script>
</body>
</html>
